name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Build with Kivy Buildozer Docker
        run: |
          docker run --rm \
            --volume "$(pwd)":/home/user/hostcwd \
            --volume ~/.buildozer-docker:/home/user/.buildozer \
            --workdir /home/user/hostcwd \
            kivy/buildozer:latest \
            android debug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaToolSuite-APK
          path: bin/*.apk
