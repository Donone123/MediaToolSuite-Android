name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-22.04

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install system dependencies
        run: |
          sudo apt update -qq
          sudo apt install -y -qq \
            git zip unzip \
            openjdk-17-jdk \
            python3-pip \
            autoconf libtool pkg-config \
            zlib1g-dev \
            libncurses5-dev \
            libffi-dev \
            libssl-dev

      - name: Install compatible CMake (avoid NDK 27 incompatibility)
        run: |
          # GitHub Actions runner has cmake 3.31 which is incompatible with NDK 27's flags.cmake
          # Install cmake 3.22 from pip and put it first in PATH
          pip install cmake==3.22.6
          echo "$(python -c 'import sysconfig; print(sysconfig.get_path("scripts"))')" >> $GITHUB_PATH

      - name: Install Buildozer
        run: |
          pip install --user buildozer
          echo "$HOME/.local/bin" >> $GITHUB_PATH

      - name: Build with Buildozer
        run: |
          buildozer android debug 2>&1

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: MediaToolSuite-APK
          path: bin/*.apk
